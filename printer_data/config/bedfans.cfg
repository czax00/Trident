############### Config options ##################

[gcode_macro _BEDFANVARS]
variable_bed_threshold: 90        # Bed temp threshold to enable fans
variable_chamber_threshold: 40    # Chamber temp target (updated externally if needed)
variable_fast: 0.3                # Fan speed before chamber temp is reached
variable_slow: 0.2                # Fan speed for low bed temp or other cases
variable_chamber_fan_speed: 0.15  # Fan speed when chamber temp is reached (updated externally if needed)
gcode:

########## Bed Fans #########

[fan_generic BedFans]
pin: PF8
kick_start_time: 0.5

########## Aliases #########

[gcode_macro BEDFANSSLOW]
gcode:
    {% set SLOW = printer["gcode_macro _BEDFANVARS"].slow|float %}
    SET_FAN_SPEED FAN=BedFans SPEED={SLOW}

[gcode_macro BEDFANSFAST]
gcode:
    {% set FAST = printer["gcode_macro _BEDFANVARS"].fast|float %}
    SET_FAN_SPEED FAN=BedFans SPEED={FAST}

[gcode_macro BEDFANSOFF]
gcode:
    SET_FAN_SPEED FAN=BedFans SPEED=0

[gcode_macro BEDFANSCHAMBER]
gcode:
    {% set CHAMBER_SPEED = printer["gcode_macro _BEDFANVARS"].chamber_fan_speed|float %}
    SET_FAN_SPEED FAN=BedFans SPEED={CHAMBER_SPEED}

[gcode_macro SET_BED_FAN_SPEED]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(0)|int %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(40)|int %}
    {% set CHAMBER_FAN_SPEED = params.CHAMBER_FAN_SPEED|default(0.15)|float %}
    {% set BED_THRESHOLD = printer["gcode_macro _BEDFANVARS"].bed_threshold|int %}

    # Update chamber variables
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_threshold VALUE={CHAMBER_TEMP}
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=chamber_fan_speed VALUE={CHAMBER_FAN_SPEED}

    # Set fan speed based on bed temp
    {% if BED_TEMP >= BED_THRESHOLD %}
        BEDFANSFAST
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
    {% else %}
        BEDFANSOFF
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    {% endif %}

################ Monitoring loop #####################

[delayed_gcode bedfanloop]
gcode:
    {% set BED_THRESHOLD = printer["gcode_macro _BEDFANVARS"].bed_threshold|int %}
    {% set CHAMBER_THRESHOLD = printer["gcode_macro _BEDFANVARS"].chamber_threshold|int %}
    {% if printer.heater_bed.target >= BED_THRESHOLD %}
        {% if "temperature_sensor chamber" in printer %}
            {% if printer["temperature_sensor chamber"].temperature|int >= CHAMBER_THRESHOLD %}
                BEDFANSCHAMBER  # Use separate chamber fan speed when temp is reached
            {% else %}
                BEDFANSFAST
                UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=5
            {% endif %}
        {% else %}
            {action_respond_info("No chamber sensor found, keeping bed fans at fast speed")}
            BEDFANSFAST
        {% endif %}
    {% endif %}
