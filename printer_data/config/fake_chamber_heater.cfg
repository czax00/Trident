[heater_generic heater_chamber]
heater_pin: PB12  # Chamber heater control pin
sensor_type: ATC Semitec 104GT-2
sensor_pin: EBBCan:gpio27  # Chamber thermistor
control: pid  # Use PID control (removed watermark)
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0
pwm_cycle_time: 0.3
min_temp: 1
max_temp: 110

[verify_heater heater_chamber]
max_error: 120
check_gain_time: 120
hysteresis: 50
heating_gain: 1

[fan_generic chamber_heater_fan]
pin: PF8
max_power: 1.0
kick_start_time: 0.5
off_below: 0.1

[gcode_macro M191]
description: Set chamber temperature and wait (for Orca Slicer compatibility)
gcode:
    {% set S = params.S|default(0)|float %}  # Get target temperature from M191 S<TEMP>
    SET_HEATER_TEMPERATURE HEATER=heater_chamber TARGET={S}
    {% if S > 0 %}
        TEMPERATURE_WAIT SENSOR="heater_generic heater_chamber" MINIMUM={S - 2} MAXIMUM={S + 2}
        M117 Chamber temp set to {S|float|round(1)}°C
    {% else %}
        M117 Chamber heater OFF
    {% endif %}

[gcode_macro START_FAN_AS_HEATER]
description: Start thermostat control for chamber_heater_fan as a heater, using Orca Slicer target temp
variable_hysteresis: 5.0    # Hysteresis range (°C)
variable_fan_state: 0       # Tracks fan state (0 = off, 1 = on)
gcode:
    M117 Starting fan as heater for chamber target temp
    UPDATE_DELAYED_GCODE ID=CHECK_CHAMBER_FOR_FAN DURATION=5  # Start checking every 5 seconds

[gcode_macro STOP_FAN_AS_HEATER]
description: Stop thermostat control and turn off chamber_heater_fan
gcode:
    UPDATE_DELAYED_GCODE ID=CHECK_CHAMBER_FOR_FAN DURATION=0  # Stop checking
    SET_FAN_SPEED FAN=chamber_heater_fan SPEED=0.0
    M117 Fan as heater stopped, Fan OFF
    SET_GCODE_VARIABLE MACRO=START_FAN_AS_HEATER VARIABLE=fan_state VALUE=0

[delayed_gcode CHECK_CHAMBER_FOR_FAN]
gcode:
    {% set TEMP = printer["heater_generic heater_chamber"].temperature|float %}
    {% set TARGET = printer["heater_generic heater_chamber"].target|float %}
    {% set HYSTERESIS = printer["gcode_macro START_FAN_AS_HEATER"].hysteresis|float %}
    {% set FAN_STATE = printer["gcode_macro START_FAN_AS_HEATER"].fan_state|int %}
    {% if TARGET > 0 %}
        {% if TEMP < (TARGET - HYSTERESIS) and FAN_STATE == 0 %}
            SET_FAN_SPEED FAN=chamber_heater_fan SPEED=1.0
            M117 Chamber temp {TEMP|float|round(1)}°C, Fan ON as heater (target {TARGET|float|round(1)}°C)
            SET_GCODE_VARIABLE MACRO=START_FAN_AS_HEATER VARIABLE=fan_state VALUE=1
        {% elif TEMP >= TARGET and FAN_STATE == 1 %}
            SET_FAN_SPEED FAN=chamber_heater_fan SPEED=0.0
            M117 Chamber temp {TEMP|float|round(1)}°C, Fan OFF (target {TARGET|float|round(1)}°C)
            SET_GCODE_VARIABLE MACRO=START_FAN_AS_HEATER VARIABLE=fan_state VALUE=0
        {% endif %}
    {% else %}
        SET_FAN_SPEED FAN=chamber_heater_fan SPEED=0.0
        M117 No chamber target temp, Fan OFF
        SET_GCODE_VARIABLE MACRO=START_FAN_AS_HEATER VARIABLE=fan_state VALUE=0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=CHECK_CHAMBER_FOR_FAN DURATION=5